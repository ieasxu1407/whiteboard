<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고급 화이트보드</title>
<style>
body { margin:0; font-family:sans-serif; background:#2e7d32; }
h1 { color:white; text-align:center; margin:10px; }
.toolbar { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:10px; }
button, input { padding:6px; border-radius:6px; border:none; }
canvas { display:block; margin:0 auto; background:#1b5e20; border:4px solid #3e2723; border-radius:10px; touch-action:none; }
</style>
</head>
<body><h1>🧑‍🏫 칠판</h1><div class="toolbar">
  <input type="color" id="color">
  <input type="range" id="size" min="1" max="20" value="5">
  <button onclick="setMode('draw')">펜</button>
  <button onclick="setMode('erase')">지우개</button>
  <button onclick="clearCanvas()">전체삭제</button>
  <button onclick="undo()">실행취소</button>
  <button onclick="toggleRuler()">자</button>
</div><canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing=false;
let mode='draw';
let history=[];
let ruler=false;

function resizeCanvas(){
  canvas.width = window.innerWidth * 0.95;
  canvas.height = window.innerHeight * 0.6;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function saveState(){
  history.push(canvas.toDataURL());
  if(history.length>20) history.shift();
}

function start(x,y){
  saveState();
  drawing=true;
  ctx.beginPath();
  ctx.moveTo(x,y);
}

function draw(x,y){
  if(!drawing) return;

  if(mode==='erase'){
    ctx.globalCompositeOperation='destination-out';
  } else {
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=document.getElementById('color').value;
  }

  ctx.lineWidth=document.getElementById('size').value;
  ctx.lineCap='round';

  if(ruler){
    ctx.lineTo(x,y);
  } else {
    ctx.lineTo(x,y);
  }

  ctx.stroke();
}

function stop(){ drawing=false; }

canvas.addEventListener('mousedown', e=>start(e.offsetX,e.offsetY));
canvas.addEventListener('mousemove', e=>draw(e.offsetX,e.offsetY));
canvas.addEventListener('mouseup', stop);

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  start(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);
});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  draw(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);
});

canvas.addEventListener('touchend', stop);

function clearCanvas(){
  saveState();
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function undo(){
  if(history.length>0){
    let img=new Image();
    img.src=history.pop();
    img.onload=()=>ctx.drawImage(img,0,0);
  }
}

function setMode(m){ mode=m; }
function toggleRuler(){ ruler=!ruler; }
</script></body>
</html>
