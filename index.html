<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>화이트보드 (GitHub Pages)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      text-align: center;
    }h1 {
  margin: 10px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

canvas {
  border: 2px solid #333;
  background: white;
  touch-action: none;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #555;
}

  </style>
</head>
<body><h1>📝 온라인 칠판</h1><div class="toolbar">
  <input type="color" id="color" value="#000000">
  <input type="range" id="size" min="1" max="20" value="5">
  <button onclick="clearCanvas()">전체 삭제</button>
  <button onclick="saveImage()">이미지 저장</button>
</div><canvas id="canvas" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let color = document.getElementById("color");
let size = document.getElementById("size");

// 마우스 이벤트
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stop);
canvas.addEventListener("mouseleave", stop);

// 터치 이벤트
canvas.addEventListener("touchstart", startTouch);
canvas.addEventListener("touchmove", drawTouch);
canvas.addEventListener("touchend", stop);

function start(e) {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function draw(e) {
  if (!drawing) return;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.strokeStyle = color.value;
  ctx.lineWidth = size.value;
  ctx.lineCap = "round";
  ctx.stroke();
}

function stop() {
  drawing = false;
}

// 터치용
function startTouch(e) {
  e.preventDefault();
  drawing = true;
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function drawTouch(e) {
  e.preventDefault();
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;

  ctx.lineTo(x, y);
  ctx.strokeStyle = color.value;
  ctx.lineWidth = size.value;
  ctx.lineCap = "round";
  ctx.stroke();
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function saveImage() {
  const link = document.createElement("a");
  link.download = "whiteboard.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script></body>
</html>
